services:
  - type: web
    name: saintscale-api
    runtime: node
    buildCommand: npm install -g bun && bun install && bun run db:migrate
    startCommand: bun run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saintscale-db
          property: connectionString
      - key: JWT_SIGNATURE
        generateValue: true

databases:
  - name: saintscale-db
    plan: free
