<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="img/favicon.ico">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<title>Cadastro</title>
	<link rel="stylesheet" href="style.css">
</head>

<body class="register">
	<main>
		<div class="main">
			<section class="off">
				<div class="gp-off">
					<div class="name">
						<h1 onclick="document.location='index.html'">Saint<b>Scale</b></h1>
					</div>
					<div class="back">
						<a href="index.html">
							<i class="bi bi-arrow-left-square-fill"></i>
						</a>
					</div>
				</div>
			</section>
			<section class="reg">
				<div class="container" id="c-cad">
					<h1>Cadastro</h1>
					<div class="form-cad">
						<form id="register-form">
							<div class="inputs">
								<p>
									Nome:
									<input type="text" id="reg-name" class="inp-txt">
								</p>
								<p>
									Telefone:
									<input type="text" id="reg-phone" class="inp-txt">
								</p>
								<p>
									Email:
									<input type="text" id="reg-email" class="inp-txt">
								</p>
								<p>
									Senha:
									<input type="password" id="reg-password" class="inp-txt">
								</p>
							</div>
							<p id="reg-error" style="color:red;display:none;"></p>
							<p id="reg-success" style="color:green;display:none;"></p>
							<input type="submit" value="Cadastrar" class="inp-cad">
						</form>
					</div>
					<p class="log">
						Já tem uma conta?
						<a href="login.html">Faça login</a>
					</p>
				</div>
			</section>
		</div>
	</main>

	<script src="config.js"></script>
	<script>
		document.getElementById("register-form").addEventListener("submit", async function (e) {
			e.preventDefault();

			const name = document.getElementById("reg-name").value.trim();
			const email = document.getElementById("reg-email").value.trim();
			const password = document.getElementById("reg-password").value;
			const errorEl = document.getElementById("reg-error");
			const successEl = document.getElementById("reg-success");

			errorEl.style.display = "none";
			successEl.style.display = "none";

			try {
				const res = await fetch(`${API_BASE}/auth/register`, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ name, email, password }),
				});

				const data = await res.json();

				if (!res.ok) {
					errorEl.textContent = data.message || "Erro ao cadastrar.";
					errorEl.style.display = "block";
					return;
				}

				successEl.textContent = "Cadastro realizado com sucesso! Redirecionando...";
				successEl.style.display = "block";
				setTimeout(() => { document.location = "login.html"; }, 1500);
			} catch (err) {
				errorEl.textContent = "Não foi possível conectar ao servidor.";
				errorEl.style.display = "block";
			}
		});
	</script>
</body>

</html>
